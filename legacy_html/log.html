<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeHer Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Full pink background */
body {
    height: 100vh;
    background: #d8cccc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Image */
.top img {
    width: 220px;
    margin-bottom: 20px;
}

/* Login box */
.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2 {
    margin-bottom: 20px;
}

/* Inputs */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Button */
.log-btn {
    width: 100%;
    padding: 12px;
    background: #ff2f92;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Links */
.extra {
    margin-top: 10px;
    font-size: 14px;
}

.extra a {
    color: #ff2f92;
    text-decoration: none;
}
</style>

</head>

<body>

<!-- Girl Image -->
<div class="top">
    <img src="https://static.vecteezy.com/system/resources/previews/019/980/655/original/cute-indian-girl-cartoon-character-png.png">
</div>

<!-- Login Box -->
<div class="login-box">
    <h2>SafeHer Login</h2>

    <div class="input-box">
        <input type="email" placeholder="Email">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password">
    </div>

   <button class="log-btn" onclick="window.location.href='route.html'">
    Login
</button>

    <div class="extra">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
</div>


</body>
</html>
